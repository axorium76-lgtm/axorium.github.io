<head>

<body>

<section class="tools-section">

<h1>Profit & Loss Calculator</h1>

<div class="tool-card">

<p>Calculate profit or loss based on cost and selling price.</p>

<input type="number" id="costPrice" placeholder="Cost Price" class="tool-input">

<input type="number" id="sellPrice" placeholder="Selling Price" class="tool-input">

<button onclick="calculateProfitLoss()">
Calculate
</button>

<div id="result"></div>

</div>

</section>

<footer>
© 2026 AXORIUM
</footer>

<script>

function calculateProfitLoss(){

let cost = parseFloat(document.getElementById("costPrice").value);
let sell = parseFloat(document.getElementById("sellPrice").value);

if(isNaN(cost) || isNaN(sell)){
document.getElementById("result").innerHTML = "Please enter both values.";
return;
}

let diff = sell - cost;

if(diff > 0){

let percent = (diff / cost) * 100;

document.getElementById("result").innerHTML =
"Profit: " + diff.toFixed(2) + " (" + percent.toFixed(2) + "%)";

}

else if(diff < 0){

let percent = (Math.abs(diff) / cost) * 100;

document.getElementById("result").innerHTML =
"Loss: " + Math.abs(diff).toFixed(2) + " (" + percent.toFixed(2) + "%)";

}

else{

document.getElementById("result").innerHTML = "No Profit No Loss";

}

}

</script>

</body>
  </html>
