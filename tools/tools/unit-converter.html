<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Universal Unit Converter | AXORIUM</title><link rel="stylesheet" href="../css/style.css"></head><body><nav class="navbar">
<div class="logo">AXORIUM</div><ul class="nav-links">
<li><a href="../index.html">Home</a></li>
<li><a href="../tools.html">Tools</a></li>
</ul>
</nav><section class="tools-section"><h1>Universal Unit Converter</h1><div class="tool-card"><p>Convert between different units quickly and easily.</p><label>Category</label>
<select id="category" class="tool-input" onchange="updateUnits()">

<option value="length">Length</option>
<option value="weight">Weight / Mass</option>
<option value="temperature">Temperature</option>
<option value="time">Time</option>
<option value="storage">Digital Storage</option>
</select><label>Value</label>
<input type="number" id="value" placeholder="Enter value" class="tool-input">

<label>From Unit</label>
<select id="fromUnit" class="tool-input"></select>

<label>To Unit</label>
<select id="toUnit" class="tool-input"></select>

<button onclick="convert()">Convert</button>
<button onclick="swapUnits()">Swap Units</button>

<div id="result"></div></div></section><footer>
© 2026 AXORIUM
</footer><script>

const units = {

length:{
meter:1,
kilometer:1000,
centimeter:0.01,
millimeter:0.001,
mile:1609.34,
yard:0.9144,
foot:0.3048,
inch:0.0254
},

weight:{
kilogram:1,
gram:0.001,
milligram:0.000001,
pound:0.453592,
ounce:0.0283495
},

time:{
second:1,
minute:60,
hour:3600,
day:86400,
week:604800
},

storage:{
byte:1,
kilobyte:1024,
megabyte:1048576,
gigabyte:1073741824,
terabyte:1099511627776
}

};

function updateUnits(){

let category = document.getElementById("category").value;

let from = document.getElementById("fromUnit");
let to = document.getElementById("toUnit");

from.innerHTML="";
to.innerHTML="";

let categoryUnits = units[category];

for(let unit in categoryUnits){

let option1 = document.createElement("option");
option1.value = unit;
option1.text = unit;
from.appendChild(option1);

let option2 = document.createElement("option");
option2.value = unit;
option2.text = unit;
to.appendChild(option2);

}

}

function convert(){

let category = document.getElementById("category").value;
let value = parseFloat(document.getElementById("value").value);
let from = document.getElementById("fromUnit").value;
let to = document.getElementById("toUnit").value;

if(isNaN(value)){
document.getElementById("result").innerHTML = "Please enter a value.";
return;
}

if(category === "temperature"){

let result;

if(from === "celsius" && to === "fahrenheit"){
result = value * 9/5 + 32;
}

document.getElementById("result").innerHTML = result;
return;

}

let baseValue = value * units[category][from];
let result = baseValue / units[category][to];

document.getElementById("result").innerHTML =
"<h3>"+value+" "+from+" = "+result.toFixed(4)+" "+to+"</h3>";

}

function swapUnits(){

let from = document.getElementById("fromUnit");
let to = document.getElementById("toUnit");

let temp = from.value;
from.value = to.value;
to.value = temp;

}

updateUnits();

</script></body>
  </html>
