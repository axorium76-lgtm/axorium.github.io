<body>

<section class="tools-section">

<h1>Break-Even Calculator</h1>

<div class="tool-card">

<p>Calculate how many units you must sell to cover your costs.</p>

<input type="number" id="fixedCost" placeholder="Fixed Costs" class="tool-input">

<input type="number" id="variableCost" placeholder="Variable Cost Per Unit" class="tool-input">

<input type="number" id="price" placeholder="Selling Price Per Unit" class="tool-input">

<button onclick="calculateBreakEven()">Calculate</button>

<div id="result"></div>

</div>

</section>

<footer>
© 2026 AXORIUM
</footer>

<script>

function calculateBreakEven(){

let fixed=parseFloat(document.getElementById("fixedCost").value)
let variable=parseFloat(document.getElementById("variableCost").value)
let price=parseFloat(document.getElementById("price").value)

let units=fixed/(price-variable)

let revenue=units*price

document.getElementById("result").innerHTML=

"<h3>Break-even Units: "+units.toFixed(2)+"</h3>"+
"<p>Break-even Revenue: $"+revenue.toFixed(2)+"</p>"

}

</script>

</body>
