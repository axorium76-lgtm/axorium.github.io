<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Student Study Dashboard | AXORIUM</title><link rel="stylesheet" href="../css/style.css"><style>

.dashboard-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
margin-top:30px;
}

.dashboard-card{
background:#111;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.dashboard-card h3{
margin-bottom:10px;
}

.timer{
font-size:40px;
text-align:center;
margin:20px 0;
}

.task{
display:flex;
justify-content:space-between;
margin-top:8px;
}

.task button{
margin-left:5px;
}

.quote{
font-style:italic;
opacity:0.8;
margin-top:10px;
}

</style></head><body><nav class="navbar">
<div class="logo">AXORIUM</div><ul class="nav-links">
<li><a href="../index.html">Home</a></li>
<li><a href="../tools.html">Tools</a></li>
</ul>
</nav><section class="tools-section"><h1>Student Study Dashboard</h1>
<p>Focus. Discipline. Consistency.</p><div class="dashboard-grid"><!-- STUDY GOAL --><div class="dashboard-card"><h3>Study Goal Setup</h3><input type="text" id="examName" placeholder="Exam Name" class="tool-input"><input type="date" id="examDate" class="tool-input"><input type="number" id="studyHours" placeholder="Target Study Hours Per Day" class="tool-input"><button onclick="setGoal()">Set Goal</button>

<div id="goalResult"></div></div><!-- EXAM COUNTDOWN --><div class="dashboard-card"><h3>Exam Countdown</h3><div id="countdown">
Set an exam date to see countdown
</div></div><!-- TASK PLANNER --><div class="dashboard-card"><h3>Daily Study Tasks</h3><input type="text" id="taskInput" placeholder="Add Study Task" class="tool-input"><button onclick="addTask()">Add Task</button>

<div id="taskList"></div></div><!-- POMODORO TIMER --><div class="dashboard-card"><h3>Pomodoro Study Timer</h3><div class="timer" id="timer">25:00</div><button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset</button>

</div><!-- MOTIVATION --><div class="dashboard-card"><h3>Motivation</h3><div class="quote" id="quote"></div></div></div></section><footer>
© 2026 AXORIUM
</footer><script>

/* EXAM GOAL */

function setGoal(){

let exam=document.getElementById("examName").value
let date=document.getElementById("examDate").value
let hours=document.getElementById("studyHours").value

let today=new Date()
let examDate=new Date(date)

let diff=Math.ceil((examDate-today)/(1000*60*60*24))

document.getElementById("goalResult").innerHTML=
exam+" in "+diff+" days<br>Target: "+hours+" hrs/day"

document.getElementById("countdown").innerHTML=
exam+" in "+diff+" days"

}

/* TASKS */

function addTask(){

let input=document.getElementById("taskInput")
let task=input.value

if(task==="")return

let div=document.createElement("div")
div.className="task"

div.innerHTML=
"<span>"+task+"</span>"+
"<div>"+
"<button onclick='this.parentElement.parentElement.remove()'>Delete</button>"+
"</div>"

document.getElementById("taskList").appendChild(div)

input.value=""

}

/* TIMER */

let time=1500
let interval

function updateTimer(){

let minutes=Math.floor(time/60)
let seconds=time%60

document.getElementById("timer").innerText=
minutes+":"+(seconds<10?"0":"")+seconds

}

function startTimer(){

if(interval)return

interval=setInterval(()=>{

time--

updateTimer()

if(time<=0){
clearInterval(interval)
interval=null
alert("Study session complete! Take a break.")
}

},1000)

}

function pauseTimer(){

clearInterval(interval)
interval=null

}

function resetTimer(){

pauseTimer()
time=1500
updateTimer()

}

updateTimer()

/* MOTIVATION */

const quotes=[
"Discipline beats motivation.",
"Focus on progress, not perfection.",
"Your future is built today.",
"Success comes from consistent effort.",
"Small daily improvements lead to big results."
]

document.getElementById("quote").innerText=
quotes[Math.floor(Math.random()*quotes.length)]

</script></body>
                                 </html>
