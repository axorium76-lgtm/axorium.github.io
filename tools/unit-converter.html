<!DOCTYPE html>
<html>
<head>
<title>AXORIUM Unit Converter</title>

<style>

body{
font-family: Arial;
background:#0b0b1f;
color:white;
text-align:center;
margin:0;
}

header{
padding:15px;
font-size:22px;
font-weight:bold;
}

nav{
margin-bottom:20px;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
}

.container{
width:90%;
max-width:420px;
margin:auto;
background:#111;
padding:25px;
border-radius:12px;
box-shadow:0 0 15px rgba(255,215,0,0.3);
}

h1{
color:#ffd700;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
font-size:16px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:8px;
background:#ffd700;
font-weight:bold;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:22px;
color:#ffd700;
}

footer{
margin-top:30px;
font-size:14px;
}

</style>
</head>

<body>

<header>AXORIUM</header>

<nav>
<a href="#">Home</a>
<a href="#">Tools</a>
</nav>

<div class="container">

<h1>Universal Unit Converter</h1>
<p>Convert between different units quickly and easily.</p>

<label>Category</label>
<select id="category" onchange="loadUnits()">
<option value="length">Length</option>
<option value="weight">Weight / Mass</option>
<option value="temperature">Temperature</option>
<option value="time">Time</option>
<option value="storage">Digital Storage</option>
</select>

<label>Value</label>
<input type="number" id="value" placeholder="Enter value">

<label>From Unit</label>
<select id="fromUnit"></select>

<label>To Unit</label>
<select id="toUnit"></select>

<button onclick="convert()">Convert</button>
<button onclick="swap()">Swap Units</button>

<div id="result"></div>

</div>

<footer>
© 2026 AXORIUM
</footer>

<script>

const units = {

length:{
meter:1,
kilometer:0.001,
centimeter:100,
millimeter:1000
},

weight:{
kilogram:1,
gram:1000,
pound:2.20462
},

time:{
second:1,
minute:1/60,
hour:1/3600
},

storage:{
byte:1,
kilobyte:0.001,
megabyte:0.000001,
gigabyte:0.000000001
}

};

function loadUnits(){

const category=document.getElementById("category").value;

const from=document.getElementById("fromUnit");
const to=document.getElementById("toUnit");

from.innerHTML="";
to.innerHTML="";

if(category==="temperature"){

["celsius","fahrenheit","kelvin"].forEach(unit=>{

let option1=document.createElement("option");
option1.value=unit;
option1.text=unit;
from.appendChild(option1);

let option2=document.createElement("option");
option2.value=unit;
option2.text=unit;
to.appendChild(option2);

});

}

else{

for(let unit in units[category]){

let option1=document.createElement("option");
option1.value=unit;
option1.text=unit;
from.appendChild(option1);

let option2=document.createElement("option");
option2.value=unit;
option2.text=unit;
to.appendChild(option2);

}

}

}

function convert(){

const value=parseFloat(document.getElementById("value").value);
const category=document.getElementById("category").value;
const from=document.getElementById("fromUnit").value;
const to=document.getElementById("toUnit").value;

let result;

if(category==="temperature"){

if(from==="celsius" && to==="fahrenheit")
result=(value*9/5)+32;

else if(from==="fahrenheit" && to==="celsius")
result=(value-32)*5/9;

else if(from==="celsius" && to==="kelvin")
result=value+273.15;

else if(from==="kelvin" && to==="celsius")
result=value-273.15;

else if(from==="fahrenheit" && to==="kelvin")
result=(value-32)*5/9+273.15;

else if(from==="kelvin" && to==="fahrenheit")
result=(value-273.15)*9/5+32;

else
result=value;

}

else{

result=value*(units[category][to]/units[category][from]);

}

document.getElementById("result").innerText=
value+" "+from+" = "+result.toFixed(4)+" "+to;

}

function swap(){

let from=document.getElementById("fromUnit");
let to=document.getElementById("toUnit");

let temp=from.value;
from.value=to.value;
to.value=temp;

}

loadUnits();

</script>

</body>
</html>
