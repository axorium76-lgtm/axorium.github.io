<section class="tools-section">

<h1>Compound Interest Calculator</h1>
<p>Calculate how your money grows with compounding.</p>

<div class="tool-card">

<input type="number" id="principal" placeholder="Initial Investment (₹)">

<input type="number" id="rate" placeholder="Annual Interest Rate (%)">

<input type="number" id="years" placeholder="Investment Duration (Years)">

<input type="number" id="frequency" placeholder="Compounds Per Year (e.g. 12)">

<br><br>

<button class="btn" onclick="calculateCompound()">Calculate</button>

<h2 id="result"></h2>

</div>

</section>

<footer>
© 2026 AXORIUM. Built for the Relentless.
</footer>

<script>

function calculateCompound() {

let principal = parseFloat(document.getElementById("principal").value);
let rate = parseFloat(document.getElementById("rate").value);
let years = parseFloat(document.getElementById("years").value);
let frequency = parseFloat(document.getElementById("frequency").value);

if (isNaN(principal) || isNaN(rate) || isNaN(years) || isNaN(frequency)) {

document.getElementById("result").innerHTML = "Please fill all fields correctly.";
return;

}

let r = rate / 100;

let amount = principal * Math.pow((1 + r / frequency), frequency * years);

let interest = amount - principal;

document.getElementById("result").innerHTML =
"Final Amount: ₹ " + amount.toFixed(2) + "<br><br>" +
"Total Interest Earned: ₹ " + interest.toFixed(2);

}

</script>

</body>
