<html lang="en">
<head>

</head>

<body>

<nav class="navbar">
    <div class="logo">AXORIUM</div>

        <li><a href="../index.html">Home</a></li>

<section class="tools-section">
<h1>Compound Interest Calculator</h1>
<p>Understand how wealth compounds over time.</p>

<div class="tool-card">

<input type="number" id="principal" placeholder="Initial Investment (₹)" style="padding:10px;width:80%;margin:10px;"><br>

<input type="number" id="rate" placeholder="Annual Interest Rate (%)" style="padding:10px;width:80%;margin:10px;"><br>

<input type="number" id="years" placeholder="Investment Duration (Years)" style="padding:10px;width:80%;margin:10px;"><br>

<input type="number" id="frequency" placeholder="Compounds Per Year (e.g. 12)" style="padding:10px;width:80%;margin:10px;"><br>

<button class="btn" onclick="calculateCI()">Calculate</button>

<h2 id="result" style="margin-top:20px;"></h2>

</div>
</section>

<footer>
© 2026 AXORIUM. Built for the Relentless.
</footer>

<script>

function calculateCI(){

let principal = parseFloat(document.getElementById("principal").value);
let rate = parseFloat(document.getElementById("rate").value);
let years = parseFloat(document.getElementById("years").value);
let freq = parseFloat(document.getElementById("frequency").value);

if(isNaN(principal) || isNaN(rate) || isNaN(years) || isNaN(freq)){
document.getElementById("result").innerHTML="Please enter valid numbers.";
return;
}

let r = rate/100;

let amount = principal * Math.pow((1 + r/freq),(freq*years));

let interest = amount - principal;

document.getElementById("result").innerHTML =
"<strong>Final Amount:</strong> ₹ "+amount.toFixed(2)+"<br><br>"+
"<strong>Total Interest Earned:</strong> ₹ "+interest.toFixed(2);

}

</script>

</body>
