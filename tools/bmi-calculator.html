<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BMI Calculator | AXORIUM</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<nav class="navbar">
<div class="logo">AXORIUM</div>

<ul class="nav-links">
<li><a href="../index.html">Home</a></li>
<li><a href="../tools.html">Tools</a></li>
</ul>
</nav>

<section class="tools-section">

<h1>BMI Calculator</h1>

<div class="tool-card">

<p>Calculate your Body Mass Index (BMI).</p>

<input type="number" id="weight" placeholder="Weight (kg)" class="tool-input">

<input type="number" id="height" placeholder="Height (cm)" class="tool-input">

<button onclick="calculateBMI()">
Calculate BMI
</button>

<div id="result"></div>

</div>

</section>

<footer>
© 2026 AXORIUM
</footer>

<script>

function calculateBMI(){

let weight = parseFloat(document.getElementById("weight").value);
let height = parseFloat(document.getElementById("height").value);

if(isNaN(weight) || isNaN(height)){
document.getElementById("result").innerHTML = "Please enter weight and height.";
return;
}

height = height / 100;

let bmi = weight / (height * height);

let category = "";

if(bmi < 18.5){
category = "Underweight";
}
else if(bmi < 25){
category = "Normal weight";
}
else if(bmi < 30){
category = "Overweight";
}
else{
category = "Obese";
}

document.getElementById("result").innerHTML =
"BMI: " + bmi.toFixed(2) + "<br>Category: " + category;

}

</script>

</body>
  </html>
