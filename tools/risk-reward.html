<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Risk Reward Calculator | AXORIUM</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<nav class="navbar">
<div class="logo">AXORIUM</div>

<ul class="nav-links">
<li><a href="../index.html">Home</a></li>
<li><a href="../tools.html">Tools</a></li>
</ul>
</nav>

<section class="tools-section">

<h1>Risk Reward Calculator</h1>

<div class="tool-card">

<p>Calculate trading risk, reward and risk-reward ratio.</p>

<input type="number" id="entry" placeholder="Entry Price" class="tool-input">

<input type="number" id="stoploss" placeholder="Stop Loss Price" class="tool-input">

<input type="number" id="target" placeholder="Target Price" class="tool-input">

<input type="number" id="quantity" placeholder="Quantity" class="tool-input">

<button onclick="calculateRiskReward()">
Calculate
</button>

<div id="result"></div>

</div>

</section>

<footer>
© 2026 AXORIUM
</footer>

<script>

function calculateRiskReward(){

let entry = parseFloat(document.getElementById("entry").value);
let stop = parseFloat(document.getElementById("stoploss").value);
let target = parseFloat(document.getElementById("target").value);
let qty = parseFloat(document.getElementById("quantity").value);

if(isNaN(entry) || isNaN(stop) || isNaN(target) || isNaN(qty)){
document.getElementById("result").innerHTML = "Please enter all values.";
return;
}

let riskPerShare = entry - stop;
let rewardPerShare = target - entry;

let totalRisk = riskPerShare * qty;
let totalReward = rewardPerShare * qty;

let ratio = rewardPerShare / riskPerShare;

document.getElementById("result").innerHTML =
"Risk per Share: " + riskPerShare.toFixed(2) + "<br>" +
"Reward per Share: " + rewardPerShare.toFixed(2) + "<br>" +
"Total Risk: " + totalRisk.toFixed(2) + "<br>" +
"Total Reward: " + totalReward.toFixed(2) + "<br>" +
"Risk-Reward Ratio: 1 : " + ratio.toFixed(2);

}

</script>

</body>
</html>
