<head>

<body>

<nav class="navbar">

<section class="tools-section">

<h1>Percentage Calculator</h1>

<div class="tool-card">

<p>Calculate percentages easily.</p>

<h3>What is X% of Y?</h3>

<input type="number" id="percent" placeholder="Enter percentage" class="tool-input">

<input type="number" id="number" placeholder="Enter number" class="tool-input">

<button onclick="calculatePercent()">
Calculate
</button>

<div id="result"></div>

</div>

</section>

<footer>
© 2026 AXORIUM
</footer>

<script>

function calculatePercent(){

let percent = document.getElementById("percent").value;
let number = document.getElementById("number").value;

if(percent === "" || number === ""){
document.getElementById("result").innerHTML = "Please enter both values.";
return;
}

let result = (percent / 100) * number;

document.getElementById("result").innerHTML =
percent + "% of " + number + " = " + result;

}

</script>

</body>
