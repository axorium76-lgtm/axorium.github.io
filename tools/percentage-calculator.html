<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Percentage Calculator | AXORIUM</title>
  <meta name="description" content="Fast percentage calculator - What is X% of Y?">
  
  <!-- SEO -->
  <link rel="canonical" href="https://axorium76-lgtm.github.io/axorium.github.io/percentage-calculator.html">
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  
  <style>
    /* CLEAN PROFESSIONAL STYLES - MATCHES YOUR DESIGN */
    .calc-container {
      max-width: 700px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    
    .tool-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .tool-header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .tool-card {
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      border: 1px solid rgba(0,0,0,0.05);
      margin-bottom: 2rem;
    }
    
    .input-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    
    @media (max-width: 600px) {
      .input-group {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
    }
    
    .input-field {
      position: relative;
    }
    
    .input-label {
      display: block;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: #333;
      font-size: 0.95rem;
    }
    
    .calc-input {
      width: 100%;
      padding: 1rem 1.2rem;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 500;
      transition: all 0.3s ease;
      background: #fafafa;
    }
    
    .calc-input:focus {
      outline: none;
      border-color: #667eea;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
      transform: translateY(-1px);
    }
    
    .calc-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 1.2rem 3rem;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s ease;
      margin-top: 1rem;
    }
    
    .calc-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(102,126,234,0.3);
    }
    
    .results-section {
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      border-radius: 16px;
      padding: 2rem;
      border-left: 5px solid #667eea;
      margin-top: 2rem;
      display: none;
    }
    
    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
      border-bottom: 1px solid #e5e7eb;
    }
    
    .result-row:last-child {
      border-bottom: none;
      font-size: 1.4rem;
      font-weight: 700;
      color: #1e293b;
      padding-top: 1.5rem;
    }
    
    .result-label {
      font-weight: 500;
      color: #475569;
    }
    
    .result-value {
      font-weight: 600;
      color: #1e293b;
      font-size: 1.2rem;
    }
    
    .error-message {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 1rem;
      border-radius: 12px;
      margin-top: 1rem;
    }
    
    .history-section {
      margin-top: 2rem;
    }
    
    .history-item {
      background: #f8fafc;
      padding: 1rem;
      border-radius: 12px;
      margin-bottom: 0.8rem;
      cursor: pointer;
      transition: all 0.2s ease;
      border-left: 3px solid #e2e8f0;
    }
    
    .history-item:hover {
      background: #e2e8f0;
      border-left-color: #667eea;
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <div class="logo">AXORIUM</div>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="../tools.html">Tools</a></li>
    </ul>
  </nav>

  <div class="calc-container">
    <div class="tool-header">
      <h1>📊 Percentage Calculator</h1>
      <p>Calculate any percentage instantly and accurately</p>
    </div>

    <div class="tool-card">
      <div class="input-group">
        <div class="input-field">
          <label class="input-label">Percentage (%)</label>
          <input type="number" id="percent" class="calc-input" placeholder="25" min="0" max="10000" step="0.01">
        </div>
        <div class="input-field">
          <label class="input-label">Number</label>
          <input type="number" id="number" class="calc-input" placeholder="200" min="0" step="0.01">
        </div>
      </div>
      
      <button class="calc-btn" onclick="calculator.calculate()">
        🧮 Calculate
      </button>
      
      <div id="results" class="results-section"></div>
    </div>

    <div class="tool-card history-section">
      <h3 style="margin-bottom: 1rem; color: #1e293b;">📋 Recent Calculations</h3>
      <div id="history-list"></div>
    </div>
  </div>

  <footer>© 2026 AXORIUM</footer>

  <script>
    class PercentageCalculator {
      constructor() {
        this.percentInput = document.getElementById('percent');
        this.numberInput = document.getElementById('number');
        this.resultsDiv = document.getElementById('results');
        this.historyDiv = document.getElementById('history-list');
        this.history = JSON.parse(localStorage.getItem('axorium_percent_history')) || [];
        this.init();
      }
      
      init() {
        // Real-time updates
        this.percentInput.addEventListener('input', this.debounce(this.updateLive.bind(this), 150));
        this.numberInput.addEventListener('input', this.debounce(this.updateLive.bind(this), 150));
        
        this.renderHistory();
      }
      
      debounce(func, delay) {
        let timeout;
        return (...args) => {
          clearTimeout(timeout);
          timeout = setTimeout(() => func.apply(this, args), delay);
        };
      }
      
      updateLive() {
        if (this.percentInput.value && this.numberInput.value) {
          this.calculate();
        }
      }
      
      calculate() {
        const percent = parseFloat(this.percentInput.value) || 0;
        const number = parseFloat(this.numberInput.value) || 0;
        
        if (!percent || !number) {
          this.showError('Please enter both values');
          return;
        }
        
        const result = (percent / 100) * number;
        
        this.resultsDiv.innerHTML = `
          <div class="result-row">
            <span class="result-label">${percent}%</span>
            <span class="result-label">of</span>
            <span class="result-value">${number.toLocaleString()}</span>
          </div>
          <div class="result-row">
            <span class="result-label">Result:</span>
            <span class="result-value">${result.toLocaleString(undefined, {maximumFractionDigits: 2})}</span>
          </div>
        `;
        this.resultsDiv.style.display = 'block';
        
        // Save to history
        const calcData = { percent, number, result, time: new Date().toLocaleTimeString() };
        this.history.unshift(calcData);
        if (this.history.length > 10) this.history = this.history.slice(0, 10);
        localStorage.setItem('axorium_percent_history', JSON.stringify(this.history));
        this.renderHistory();
      }
      
      showError(message) {
        this.resultsDiv.innerHTML = `<div class="error-message">${message}</div>`;
        this.resultsDiv.style.display = 'block';
      }
      
      renderHistory() {
        if (this.history.length === 0) {
          this.historyDiv.innerHTML = '<div style="color: #94a3b8; text-align: center; padding: 2rem;">No calculations yet</div>';
          return;
        }
        
        this.historyDiv.innerHTML = this.history.map((item, index) => `
          <div class="history-item" onclick="calculator.loadCalc(${index})">
            <strong>${item.percent}%</strong> of <strong>${item.number.toLocaleString()}</strong> 
            = <strong style="color: #667eea;">${item.result.toLocaleString()}</strong>
            <small style="float: right; color: #64748b;">${item.time}</small>
          </div>
        `).join('');
      }
      
      loadCalc(index) {
        const item = this.history[index];
        this.percentInput.value = item.percent;
        this.numberInput.value = item.number;
        this.calculate();
      }
    }
    
    // Start calculator
    const calculator = new PercentageCalculator();
  </script>
</body>
  </html>
