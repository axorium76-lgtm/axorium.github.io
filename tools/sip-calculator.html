<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXORIUM | SIP Calculator</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<nav class="navbar">
    <div class="logo">AXORIUM</div>
    <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="../tools.html">Tools</a></li>
        <li><a href="../about.html">About</a></li>
    </ul>
</nav>

<section class="tools-section">
    <h1>SIP Calculator</h1>
    <p>Calculate disciplined wealth accumulation with precision.</p>

    <div class="tool-card">
        <input type="number" id="monthly" placeholder="Monthly Investment (₹)" style="padding:10px; width:80%; margin:10px;"><br>
        <input type="number" id="rate" placeholder="Annual Interest Rate (%)" style="padding:10px; width:80%; margin:10px;"><br>
        <input type="number" id="years" placeholder="Investment Duration (Years)" style="padding:10px; width:80%; margin:10px;"><br>

        <button onclick="calculateSIP()" class="btn">Calculate</button>

        <h2 id="result" style="margin-top:20px;"></h2>
    </div>
</section>

<footer>
    © 2026 AXORIUM. Built for the Relentless.
</footer>

<script>
function calculateSIP() {
    let monthly = parseFloat(document.getElementById("monthly").value);
    let annualRate = parseFloat(document.getElementById("rate").value);
    let years = parseFloat(document.getElementById("years").value);

    if (!monthly || !annualRate || !years) {
        document.getElementById("result").innerText = "Please fill all fields correctly.";
        return;
    }

    let monthlyRate = annualRate / 12 / 100;
    let months = years * 12;

    let maturity = monthly * ((Math.pow(1 + monthlyRate, months) - 1) / monthlyRate) * (1 + monthlyRate);

    document.getElementById("result").innerText =
        "Estimated Maturity Value: ₹ " + maturity.toFixed(2);
}
</script>

</body>
  </html>
