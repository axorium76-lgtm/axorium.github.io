<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXORIUM | SIP Calculator</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<nav class="navbar">
    <div class="logo">AXORIUM</div>
    <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="../tools.html">Tools</a></li>
        <li><a href="../about.html">About</a></li>
    </ul>
</nav>

<section class="tools-section">
    <h1>SIP Calculator</h1>
    <p>Calculate disciplined wealth accumulation with precision.</p>

    <div class="tool-card">
        <input type="number" id="monthly" placeholder="Monthly Investment (₹)" style="padding:10px; width:80%; margin:10px;"><br>
        <input type="number" id="rate" placeholder="Annual Interest Rate (%)" style="padding:10px; width:80%; margin:10px;"><br>
        <input type="number" id="years" placeholder="Investment Duration (Years)" style="padding:10px; width:80%; margin:10px;"><br>

        <button onclick="calculateSIP()" class="btn">Calculate</button>

        <h2 id="result" style="margin-top:20px;"></h2>
    </div>
</section>

<footer>
    © 2026 AXORIUM. Built for the Relentless.
</footer>
<script>
document.addEventListener("DOMContentLoaded", function () {

    function calculateSIP() {
        const monthly = parseFloat(document.getElementById("monthly").value);
        const annualRate = parseFloat(document.getElementById("rate").value);
        const years = parseFloat(document.getElementById("years").value);

        if (isNaN(monthly) || isNaN(annualRate) || isNaN(years)) {
            document.getElementById("result").innerHTML = "Please enter valid numbers.";
            return;
        }

        const monthlyRate = annualRate / 12 / 100;
        const months = years * 12;

        const maturity = monthly * ((Math.pow(1 + monthlyRate, months) - 1) / monthlyRate) * (1 + monthlyRate);
        const invested = monthly * months;
        const returns = maturity - invested;

        document.getElementById("result").innerHTML =
            "<strong>Total Invested:</strong> ₹ " + invested.toFixed(2) + "<br><br>" +
            "<strong>Total Returns:</strong> ₹ " + returns.toFixed(2) + "<br><br>" +
            "<strong>Final Maturity Value:</strong> ₹ " + maturity.toFixed(2);
    }

    // Attach function to button safely
    document.querySelector(".btn").addEventListener("click", calculateSIP);

});
</script>

</body>
  </html>
